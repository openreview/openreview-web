# This workflow deploys any branch, tag, or commit hash to the production environment.
# Flow (normal deploy):
#   1. Build Next.js and upload artifact to GCS (skipped if build already exists)
#   2. Run Packer to bake the artifact into a new GCE image
#   3. Terraform apply to update the instance template
#   4. Rolling update — replace MIG instances one at a time with zero downtime
#   5. Deploy static files to nginx (symlinks /_next and .html files into nginx html dir)
#
# Flow (rollback — tag already has a GCS image mapping):
#   1. Resolve tag to previously baked image via GCS mapping
#   2. Rolling update directly — skips build, Packer, and Terraform
#   3. Deploy static files to nginx

name: Production Deployment

on:
  workflow_dispatch:
    inputs:
      tag:
        description: The branch, tag, or commit hash to deploy
        required: false
        default: master
        type: string

jobs:
  deploy:
    permissions:
      id-token: write
      contents: read

    runs-on: ubuntu-latest

    env:
      TAG: ${{ github.event.inputs.tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: openreview
          repositories: openreview-cloud

      - name: Checkout openreview-cloud
        uses: actions/checkout@v6
        with:
          repository: openreview/openreview-cloud
          path: openreview-cloud
          token: ${{ steps.app-token.outputs.token }}

      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
          cleanup_credentials: true
          export_environment_variables: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          skip_install: true

      - name: Check for existing image mapping
        id: check-mapping
        run: |
          if gsutil -q stat gs://openreview-general/web-image-map/${TAG}; then
            echo "is_rollback=true" >> $GITHUB_OUTPUT
            echo "Existing image mapping found for ${TAG} — rollback mode"
          else
            echo "is_rollback=false" >> $GITHUB_OUTPUT
            echo "No image mapping found for ${TAG} — full deploy mode"
          fi

      - name: Run deploy script
        id: build
        if: steps.check-mapping.outputs.is_rollback == 'false'
        run: |
          cd $GITHUB_WORKSPACE
          gsutil cp gs://openreview-general/conf/production.env $GITHUB_WORKSPACE/.env.local
          config_hash="$(sha1sum $GITHUB_WORKSPACE/.env.local | cut -d " " -f 1)"
          build_id="$(git describe --tags)-$config_hash"
          echo "build_id=$build_id" >> $GITHUB_OUTPUT
          echo "Build ID: $build_id"

          if gsutil ls "gs://openreview-general/openreview-web-builds/${build_id}.tar.gz" ; then
            echo "Build already exists, skipping build step."
            curl -s "https://cowsay.morecode.org/say?message=MOO%21%20BUILD%20ALREADY%20EXISTS:%20${build_id}&format=text"
          else
            echo "Building OpenReview web application..."
            npm ci
            npm run build
            echo "compressing build."

            cp -a "$GITHUB_WORKSPACE" "/tmp/${build_id}"
            cd /tmp
            tar -czf "/tmp/${build_id}.tar.gz" "${build_id}"

            echo "copying build to Google Cloud."
            gsutil cp "/tmp/${build_id}.tar.gz" "gs://openreview-general/openreview-web-builds/${build_id}.tar.gz"
            curl -s "https://cowsay.morecode.org/say?message=MOO%21%20YOU%20CREATED%20A%20BUILD%20SUCCESSFULLY&format=text"
          fi

          gsutil cp gs://openreview-general/conf/deployment.conf ./deployment.conf
          sed -i "s/WEB_TAG=.*/WEB_TAG=\"$TAG\"/" ./deployment.conf
          sed -i '/^BUILD_ID=/d' ./deployment.conf
          echo "BUILD_ID=\"$build_id\"" >> ./deployment.conf
          gsutil cp ./deployment.conf gs://openreview-general/conf/deployment.conf

      - name: Setup Packer
        if: steps.check-mapping.outputs.is_rollback == 'false'
        uses: hashicorp/setup-packer@v3.2.0
        with:
          version: latest

      - name: Build GCE image with Packer
        id: packer
        if: steps.check-mapping.outputs.is_rollback == 'false'
        working-directory: openreview-cloud/Images/openreview-web
        env:
          BUILD_ID: ${{ steps.build.outputs.build_id }}
        run: |
          packer init .
          packer build \
            -var="build_id=${BUILD_ID}" \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}"  \
            .
          image=$(jq -r '.builds[-1].artifact_id' manifest.json | cut -d: -f2)
          echo "image=$image" >> $GITHUB_OUTPUT

      - name: Record image→tag mapping
        if: steps.check-mapping.outputs.is_rollback == 'false'
        env:
          IMAGE: ${{ steps.packer.outputs.image }}
        run: echo "$IMAGE" | gsutil cp - gs://openreview-general/web-image-map/${TAG}

      - name: Setup Terraform
        if: steps.check-mapping.outputs.is_rollback == 'false'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform apply — update instance template and roll MIG
        if: steps.check-mapping.outputs.is_rollback == 'false'
        working-directory: openreview-cloud/Terraform/prod/web
        env:
          IMAGE: ${{ steps.packer.outputs.image }}
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="image=${IMAGE}"

      - name: Start MIG rolling update
        run: |
          if [ "${{ steps.check-mapping.outputs.is_rollback }}" = "true" ]; then
            IMAGE=$(gsutil cat gs://openreview-general/web-image-map/${TAG})
            echo "Rolling back to image: $IMAGE"
          else
            IMAGE="${{ steps.packer.outputs.image }}"
          fi
          gcloud compute instance-groups managed rolling-action start-update openreview-web \
            --region=us-central1 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --version=template=projects/${{ secrets.GCP_PROJECT_ID }}/regions/us-central1/instanceTemplates/openreview-web-template-${IMAGE} \
            --max-surge=3 \
            --max-unavailable=0

      - name: Wait for rollout to complete
        run: |
          gcloud compute instance-groups managed wait-until openreview-web \
            --version-target-reached \
            --region=us-central1 \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Sync error pages to GCS
        run: |
          gsutil -m rsync -r $GITHUB_WORKSPACE/public/html/ gs://openreview-public/error-pages/

      - name: Deploy static files to nginx
        run: |
          nvm='export NVM_DIR="$HOME/.nvm" && [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh" &&'

          nginx='nginx'

          nginx=$(gcloud compute instances list | grep "$nginx" | grep RUNNING | tr -s ' ' | cut -d' ' -f1,2)

          nginx_arr=(${nginx// / })
          nginx_name=${nginx_arr[0]}
          nginx_zone=${nginx_arr[1]}

          gcloud compute --project "${{ secrets.GCP_PROJECT_ID }}" ssh --zone $nginx_zone --tunnel-through-iap openreview@$nginx_name --command "${nvm} bash bin/deploy-web.sh ${TAG}" --quiet